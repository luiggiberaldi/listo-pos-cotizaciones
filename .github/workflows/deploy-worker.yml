name: Deploy Worker a Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Instalar dependencias
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build
        env:
          VITE_SUPABASE_URL: https://oyfyuszgjwcepjpngclv.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im95Znl1c3pnandjZXBqcG5nY2x2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Mjk0NDMsImV4cCI6MjA5MTAwNTQ0M30.auhmnHCQ3a9wyv0nmhqWi1Q8iz0wavResvgsly6Gibs
          # No VITE_WORKER_ORIGIN — en workers.dev el frontend y API son same-origin

      - name: Deploy a Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc
