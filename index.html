<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Construacero Carabobo — Sistema de gestión para ferretería" />
  <title>Construacero Carabobo</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0ea5e9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Construacero" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Tipografía -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root">
    <!-- Splash screen CSS puro — visible instantáneamente mientras React carga -->
    <div id="splash" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f9ff 0%,#ecfdf5 100%)">
      <div style="display:flex;flex-direction:column;align-items:center;gap:1rem">
        <img src="/logo-dark.png" alt="Construacero" style="height:96px;width:auto;opacity:.9" />
        <div style="width:32px;height:32px;border:3px solid #7dd3fc;border-top-color:#0ea5e9;border-radius:50%;animation:sp .7s linear infinite"></div>
      </div>
    </div>
    <style>#splash{transition:opacity .2s}@keyframes sp{to{transform:rotate(360deg)}}</style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
